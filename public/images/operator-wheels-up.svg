<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#0D1020"/>
  <rect x="1" y="1" width="198" height="198" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.3"/>
  <!-- Upward arrow wings symbol -->
  <path d="M100,55 L100,130" stroke="#C9A84C" stroke-width="2" opacity="0.5"/>
  <path d="M100,55 L80,80 M100,55 L120,80" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>
  <!-- Wing spread -->
  <path d="M50,100 Q75,85 100,80 Q125,85 150,100" fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.5"/>
  <path d="M60,110 Q80,98 100,95 Q120,98 140,110" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.25"/>
  <!-- WU monogram hint -->
  <text x="100" y="148" font-family="Georgia, serif" font-size="22" fill="#C9A84C" text-anchor="middle" letter-spacing="2" opacity="0.35">WU</text>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="58" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.2"/>
  <!-- Label -->
  <text x="100" y="172" font-family="Georgia, serif" font-size="11" fill="#C9A84C" text-anchor="middle" letter-spacing="3" opacity="0.85">WHEELS UP</text>
  <!-- Corner marks -->
  <path d="M12,12 L12,24 M12,12 L24,12" stroke="#C9A84C" stroke-width="1" opacity="0.3" fill="none"/>
  <path d="M188,12 L188,24 M188,12 L176,12" stroke="#C9A84C" stroke-width="1" opacity="0.3" fill="none"/>
  <path d="M12,188 L12,176 M12,188 L24,188" stroke="#C9A84C" stroke-width="1" opacity="0.3" fill="none"/>
  <path d="M188,188 L188,176 M188,188 L176,188" stroke="#C9A84C" stroke-width="1" opacity="0.3" fill="none"/>
</svg>
